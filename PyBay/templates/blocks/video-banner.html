{% set video = record.attachments.get(this.video) %}
<div class="hero" style="min-height: {{ this.height }}px;">
  <div style="position: absolute; inset: 0; z-index: 0; overflow: hidden;">
    <video autoplay muted loop playsinline style="width: 100%; height: 100%; object-fit: cover; opacity: 0.3;">
      <source src="{{ video|url }}">
    </video>
  </div>
  <div class="container" style="position: relative; z-index: 1;">
    <div class="hero-content">
      {% if this.center_image %}
        {% set logo = record.attachments.get(this.center_image) %}
        <img alt="logo" src="{{ logo|url }}" style="max-height: 80px; margin-bottom: 24px;">
      {% endif %}
      {% if this.contents %}
        {{ this.contents }}
      {% endif %}
    </div>
  </div>
</div>
