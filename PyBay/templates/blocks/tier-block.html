{% from 'macros/blocksupport.html' import render_full_width_blocks %}
<div class="sponsor-tier" style="margin-top: var(--space-6);">
  <h3 class="tier-header">{{ this.tier_name }} Sponsors</h3>
  <div class="sponsor-grid sponsor-grid--{{ this.tier_name.lower() }}">
    {{ render_full_width_blocks(this.add_sponsors.blocks, classes='col-md-12') }}
  </div>
  {% if this.description %}
    <div style="margin-top: var(--space-3);">
      {{ this.description }}
    </div>
  {% endif %}
</div>
